<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Student</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    :root {
      --cream: #FAF6F0;
      --cream-card: #FFFFFF;
      --terracotta: #D97757;
      --terracotta-dark: #B5613F;
      --charcoal: #2D2A26;
      --muted: #8A8478;
      --border: #E8E1D6;
      --green: #5C8A5C;
      --green-bg: #EAF1E8;
      --red: #C2604A;
      --red-bg: #F7E9E4;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--cream);
      color: var(--charcoal);
      font-family: 'Georgia', 'Segoe UI', serif;
      min-height: 100vh;
    }
    .navbar {
      background: var(--cream-card) !important;
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 0;
    }
    .navbar-brand {
      color: var(--charcoal) !important;
      font-weight: 700;
      font-size: 1.1rem;
      font-family: 'Segoe UI', sans-serif;
      text-decoration: none !important;
    }
    .form-card {
      background: var(--cream-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.25rem;
      max-width: 520px;
      margin: 3rem auto;
    }
    .form-card h2 {
      font-family: 'Georgia', serif;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--charcoal);
    }
    .form-label {
      color: var(--muted);
      font-size: 0.85rem;
      font-family: 'Segoe UI', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-control {
      background: var(--cream);
      border: 1px solid var(--border);
      color: var(--charcoal);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: 'Segoe UI', sans-serif;
    }
    .form-control:focus {
      background: #fff;
      color: var(--charcoal);
      border-color: var(--terracotta);
      box-shadow: 0 0 0 3px rgba(217, 119, 87, 0.12);
    }
    .btn-submit {
      background: var(--terracotta);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-weight: 700;
      width: 100%;
      font-size: 1rem;
      font-family: 'Segoe UI', sans-serif;
      transition: background 0.15s;
    }
    .btn-submit:hover { background: var(--terracotta-dark); }
    .alert-box {
      border-radius: 10px;
      padding: 12px 16px;
      margin-top: 1rem;
      display: none;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.9rem;
    }
    .alert-success { background: var(--green-bg); border: 1px solid #C5DCC0; color: var(--green); }
    .alert-error { background: var(--red-bg); border: 1px solid #EBC5BA; color: var(--red); }
    table { font-size: 0.9rem; font-family: 'Segoe UI', sans-serif; }
    thead { background: var(--cream); }
    th { color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; }
    td { color: var(--charcoal); vertical-align: middle; }
    .badge-del {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid #EBC5BA;
      border-radius: 6px;
      padding: 3px 12px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-del:hover { background: #f1d4cb; }
    .table-wrap {
      background: var(--cream-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
  </style>
</head>
<body>
<nav class="navbar px-4">
  <a href="index.html" class="navbar-brand">← Dashboard</a>
</nav>
<div class="container">
  <div class="form-card">
    <h2>Add New Student</h2>
    <div>
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control mt-1" id="name" placeholder="e.g. Rahul Sharma"/>
      </div>
      <div class="mb-3">
        <label class="form-label">Roll Number</label>
        <input type="text" class="form-control mt-1" id="roll_no" placeholder="e.g. CS2024001"/>
      </div>
      <div class="mb-3">
        <label class="form-label">Class</label>
        <input type="text" class="form-control mt-1" id="class" placeholder="e.g. 10th-A"/>
      </div>
      <button class="btn-submit" onclick="addStudent()">Add Student</button>
      <div class="alert-box" id="alert"></div>
    </div>
  </div>

  <div style="max-width:760px; margin: 0 auto 3rem;">
    <h4 style="font-family:'Georgia',serif; font-weight:700; margin-bottom:1rem;">All Students</h4>
    <div class="table-wrap">
      <table class="table table-borderless mb-0">
        <thead>
          <tr><th class="ps-3">Name</th><th>Roll No</th><th>Class</th><th class="text-end pe-3">Action</th></tr>
        </thead>
        <tbody id="students-body">
          <tr><td colspan="4" class="text-center" style="color:var(--muted); padding:2rem;">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script>
  async function loadStudents() {
    const res = await fetch('/api/students');
    const students = await res.json();
    const tbody = document.getElementById('students-body');
    if (students.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center" style="color:var(--muted); padding:2rem;">No students yet</td></tr>';
      return;
    }
    tbody.innerHTML = students.map(s => `
      <tr>
        <td class="ps-3">${s.name}</td>
        <td>${s.roll_no}</td>
        <td>${s.class}</td>
        <td class="text-end pe-3"><span class="badge-del" onclick="deleteStudent(${s.id})">Delete</span></td>
      </tr>
    `).join('');
  }

  async function addStudent() {
    const name = document.getElementById('name').value.trim();
    const roll_no = document.getElementById('roll_no').value.trim();
    const cls = document.getElementById('class').value.trim();
    const alert = document.getElementById('alert');
    if (!name || !roll_no || !cls) {
      alert.className = 'alert-box alert-error'; alert.style.display = 'block';
      alert.textContent = 'All fields are required!'; return;
    }
    try {
      const res = await fetch('/api/students', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, roll_no, class: cls })
      });
      const data = await res.json();
      if (res.ok) {
        alert.className = 'alert-box alert-success'; alert.style.display = 'block';
        alert.textContent = 'Student added successfully!';
        document.getElementById('name').value = '';
        document.getElementById('roll_no').value = '';
        document.getElementById('class').value = '';
        loadStudents();
      } else {
        alert.className = 'alert-box alert-error'; alert.style.display = 'block';
        alert.textContent = data.error || 'Error adding student';
      }
    } catch { alert.className = 'alert-box alert-error'; alert.style.display = 'block'; alert.textContent = 'Server error!'; }
  }

  async function deleteStudent(id) {
    if (!confirm('Delete this student and all their results?')) return;
    await fetch('/api/students/' + id, { method: 'DELETE' });
    loadStudents();
  }

  loadStudents();
</script>
</body>
</html>
