<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>View Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    :root {
      --cream: #FAF6F0;
      --cream-card: #FFFFFF;
      --terracotta: #D97757;
      --terracotta-dark: #B5613F;
      --charcoal: #2D2A26;
      --muted: #8A8478;
      --border: #E8E1D6;
      --green: #5C8A5C;
      --green-bg: #EAF1E8;
      --red: #C2604A;
      --red-bg: #F7E9E4;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--cream);
      color: var(--charcoal);
      font-family: 'Georgia', 'Segoe UI', serif;
      min-height: 100vh;
    }
    .navbar {
      background: var(--cream-card) !important;
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 0;
    }
    .navbar-brand {
      color: var(--charcoal) !important;
      font-weight: 700;
      font-size: 1.1rem;
      font-family: 'Segoe UI', sans-serif;
      text-decoration: none !important;
    }
    h2.page-title { font-family: 'Georgia', serif; font-weight: 700; }
    .form-select {
      background: var(--cream-card) !important;
      border: 1px solid var(--border);
      color: var(--charcoal) !important;
      border-radius: 10px;
      font-family: 'Segoe UI', sans-serif;
    }
    .form-select:focus {
      border-color: var(--terracotta);
      box-shadow: 0 0 0 3px rgba(217, 119, 87, 0.12);
    }
    .table-wrap {
      background: var(--cream-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    table { font-family: 'Segoe UI', sans-serif; }
    thead { background: var(--cream); }
    th { color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; }
    td { color: var(--charcoal); vertical-align: middle; font-size: 0.9rem; }
    .pass {
      background: var(--green-bg);
      color: var(--green);
      border-radius: 999px;
      padding: 3px 14px;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .fail {
      background: var(--red-bg);
      color: var(--red);
      border-radius: 999px;
      padding: 3px 14px;
      font-size: 0.78rem;
      font-weight: 700;
    }
  </style>
</head>
<body>
<nav class="navbar px-4">
  <a href="index.html" class="navbar-brand">← Dashboard</a>
</nav>
<div class="container py-4">
  <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
    <h2 class="page-title" style="margin:0;">All Results</h2>
    <select class="form-select" style="max-width:240px;" id="student-filter" onchange="filterResults()">
      <option value="all">All Students</option>
    </select>
  </div>
  <div class="table-wrap">
    <table class="table table-borderless mb-0">
      <thead>
        <tr><th class="ps-3">Student</th><th>Roll No</th><th>Subject</th><th>Marks</th><th>%</th><th>Status</th><th class="pe-3">Date</th></tr>
      </thead>
      <tbody id="results-body">
        <tr><td colspan="7" class="text-center" style="color:var(--muted); padding:3rem;">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>
<script>
  let allResults = [];

  async function loadData() {
    const [sRes, rRes] = await Promise.all([fetch('/api/students'), fetch('/api/results')]);
    const students = await sRes.json();
    allResults = await rRes.json();
    const sel = document.getElementById('student-filter');
    sel.innerHTML = '<option value="all">All Students</option>' +
      students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    renderTable(allResults);
  }

  function filterResults() {
    const val = document.getElementById('student-filter').value;
    const filtered = val === 'all' ? allResults : allResults.filter(r => r.student_id == val);
    renderTable(filtered);
  }

  function renderTable(results) {
    const tbody = document.getElementById('results-body');
    if (results.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="text-center" style="color:var(--muted); padding:3rem;">No results found</td></tr>';
      return;
    }
    tbody.innerHTML = results.map(r => {
      const pct = ((r.marks_obtained / r.total_marks) * 100).toFixed(1);
      const pass = parseFloat(pct) >= 40;
      return `
        <tr>
          <td class="ps-3">${r.name}</td>
          <td>${r.roll_no}</td>
          <td>${r.subject}</td>
          <td>${r.marks_obtained} / ${r.total_marks}</td>
          <td>${pct}%</td>
          <td><span class="${pass ? 'pass' : 'fail'}">${pass ? 'Pass' : 'Fail'}</span></td>
          <td class="pe-3">${new Date(r.exam_date).toLocaleDateString()}</td>
        </tr>
      `;
    }).join('');
  }

  loadData();
</script>
</body>
</html>
